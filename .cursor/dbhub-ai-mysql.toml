[[sources]]
id = "ai_text_service"
description = "ReachAI ai_text_service MySQL"
type = "mysql"
host = "${AI_MYSQL_HOST}"
port = 33106
database = "${AI_MYSQL_DATABASE}"
user = "${AI_MYSQL_USER}"
password = "${AI_MYSQL_PASSWORD}"
query_timeout = 30

[[tools]]
name = "execute_sql"
source = "ai_text_service"
readonly = true
max_rows = 500

[[tools]]
name = "search_objects"
source = "ai_text_service"
