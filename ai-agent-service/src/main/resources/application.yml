server:
  port: 18603

spring:
  application:
    name: ai-agent-service

  datasource:
    url: ${AI_MYSQL_URL:jdbc:mysql://127.0.0.1:3306/ai_text_service?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${AI_MYSQL_USER:ai_text_service}
    password: ${AI_MYSQL_PASSWORD:your-password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:false}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        enabled: ${NACOS_ENABLED:false}
        file-extension: yml
    # LLM 单次可能超过 1～2 分钟，默认 Feign 读超时会报 Read timed out；调大以匹配长生成
    # OpenFeign：有 contextId 时按 contextId 取配置，不按 name。ScannerServiceClient 的 contextId=scannerServiceClient，
    # 仅配 ai-skills-service 不会作用于扫描客户端，仍会默认短读超时 → agent Read timed out，skills 侧「客户端中断连接」。
    openfeign:
      client:
        config:
          ai-model-service:
            connectTimeout: 10000
            readTimeout: ${FEIGN_MODEL_READ_TIMEOUT_MS:300000}
          ai-skills-service:
            connectTimeout: 10000
            readTimeout: ${FEIGN_SKILLS_READ_TIMEOUT_MS:300000}
          scannerServiceClient:
            connectTimeout: 15000
            readTimeout: ${FEIGN_SCANNER_READ_TIMEOUT_MS:900000}

# ==================== 服务间调用 ====================
services:
  model-service:
    url: ${MODEL_SERVICE_URL:http://localhost:8601}
  skills-service:
    url: ${SKILLS_SERVICE_URL:http://localhost:8602}

# ==================== 极视角平台 ====================
jishi:
  platform:
    base-url: ${JISHI_BASE_URL:http://127.0.0.1:31003}
    api-key: ${JISHI_API_KEY:123456}
    timeout: 30000
    agents:
      default-chat:
        app-id: 2014777d-3eea-4a0c-b3cc-569c212b31f3
        name: 默认对话智能体
        description: 极视角业务工具（会话管理、文件上传、工作流交互）

# ==================== AgentScope ====================
# Agent 的 LLM 调用统一通过 model-service 的 OpenAI 兼容代理端点
agentscope:
  model:
    instance-id: ${AGENTSCOPE_MODEL_INSTANCE_ID:}

# ==================== Agent 配置 ====================
agent:
  model-instance-id: ${AGENT_MODEL_INSTANCE_ID:}
  max-steps: 5
  default-timeout: 60000
  definitions:
    file: ${AGENT_DEF_FILE:agent-definitions.json}
  agents:
    query-data: false
    knowledge-qa: true
    business-operation: false
    analysis: false
    creative-task: false
    general-chat: true
  intent:
    system-prompt: |
      你是一个意图识别专家。请分析用户的输入，判断用户意图属于以下哪个类别：
      1. QUERY_DATA - 问数/数据查询（如：查询某个数据、统计某项指标）
      2. KNOWLEDGE_QA - 知识问答（如：查询制度规定、操作流程、技术规范）
      3. BUSINESS_OPERATION - 业务操作（如：发起审批、提交工单、执行业务动作）
      4. ANALYSIS - 数据分析（如：对比分析、趋势分析、综合评估、给出建议）
      5. GENERAL_CHAT - 闲聊（不属于以上类别的一般对话）
      请只返回意图类别名称，不要返回其他内容。

# ==================== 会话记忆 ====================
memory:
  max-messages: 20
  ttl-hours: 24

# ==================== RAG（通过 ai-skills-service） ====================
rag:
  top-k: 5
  score-threshold: 0.7

# ==================== Milvus（Tool Retrieval 直连） ====================
milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}

# ==================== Tool Retrieval & Call Log ====================
ai:
  tool-retrieval:
    enabled: ${TOOL_RETRIEVAL_ENABLED:true}
    top-k: 15
    min-score: 0.22
    fallback-on-error: true
    collection-name: tool_embeddings
    embedding-dim: 1536
    embedding-model-instance-id: ${TOOL_EMBEDDING_MODEL_INSTANCE_ID:}
  tool-call-log:
    enabled: ${TOOL_CALL_LOG_ENABLED:true}
    async: true
    result-max-chars: 2000
    args-max-chars: 4000
    tool-parameters-snapshot-max-chars: 2500
  tool-rate-limit:
    enabled: ${TOOL_RATE_LIMIT_ENABLED:false}
    capacity: ${TOOL_RATE_LIMIT_CAPACITY:120}
    window-seconds: ${TOOL_RATE_LIMIT_WINDOW_SECONDS:60}
    per-user: true
    per-roles: false
  # 接口图谱：扫描完成后是否自动全量投影（默认 false，仅扫描时可关；需要画布跟随时设 true 或 API_GRAPH_REBUILD_ON_SCAN=true）
  api-graph:
    rebuild-on-scan: ${API_GRAPH_REBUILD_ON_SCAN:false}

# ==================== 日志 ====================
logging:
  level:
    com.enterprise.ai.agent: DEBUG
    io.agentscope: DEBUG

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
