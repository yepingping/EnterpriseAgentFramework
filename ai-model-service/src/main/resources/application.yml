server:
  port: 18601

spring:
  application:
    name: ai-model-service
  datasource:
    url: ${AI_MYSQL_URL:jdbc:mysql://127.0.0.1:3306/ai_text_service?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${AI_MYSQL_USER:ai_text_service}
    password: ${AI_MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

model:
  credential-secret: ${MODEL_CREDENTIAL_SECRET:dev-only-change-me-please-32-bytes}

logging:
  level:
    com.enterprise.ai.model: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
