server:
  port: 18602
  servlet:
    context-path: /ai

spring:
  application:
    name: ai-skills-service

  datasource:
    url: ${AI_MYSQL_URL:jdbc:mysql://127.0.0.1:3306/ai_text_service?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${AI_MYSQL_USER:ai_text_service}
    password: ${AI_MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ---- Milvus 配置 ----
milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  dimension: 1536

embedding:
  model-service:
    url: ${MODEL_SERVICE_URL:http://localhost:18601}

# ---- RAG 配置 ----
rag:
  default-top-k: 5
  score-threshold: 0.5

# ---- Pipeline 入库流水线配置 ----
pipeline:
  definitions:
    default:
      steps:
        - FILE_PARSE
        - TEXT_CLEAN
        - CHUNK
        - EMBEDDING
        - VECTOR_STORE
        - METADATA_PERSIST
    kb_contract:
      steps:
        - FILE_PARSE
        - TEXT_CLEAN
        - CHUNK
        - EMBEDDING
        - VECTOR_STORE
        - METADATA_PERSIST
    kb_scan:
      steps:
        - FILE_PARSE
        - OCR
        - TEXT_CLEAN
        - CHUNK
        - EMBEDDING
        - VECTOR_STORE
        - METADATA_PERSIST

spring.servlet.multipart:
  max-file-size: 50MB
  max-request-size: 100MB

logging:
  level:
    com.enterprise.ai: DEBUG
    io.milvus: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
